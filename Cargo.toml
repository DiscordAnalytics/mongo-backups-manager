[package]
name = "mdbbm"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4.43", default-features = false, features = ["std", "clock"] }
ratatui = { version = "0.30.0", default-features = false, features = [
  "crossterm",
] }

[profile.release]
opt-level = "z"
codegen-units = 1
lto = true
strip = true
